name: Update Manifest

# Regenerates docs/manifest.json (the sha256 map the VibeMon Desktop app
# uses to detect out-of-date installed scripts) whenever the files it covers
# change. docs/manifest.json itself is excluded from the trigger paths so
# the bot's own commit can't retrigger this workflow.
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/generate_manifest.py'
      - '!docs/manifest.json'

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Regenerate manifest
        run: python3 scripts/generate_manifest.py

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain docs/manifest.json)" ]; then
            echo "docs/manifest.json is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/manifest.json
          git commit -m "chore: update manifest.json"
          git push
